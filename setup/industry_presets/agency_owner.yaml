  - name: "Alex Hormozi"
    topics: ["offers", "agency growth", "pricing"]
    priority: "high"
  - name: "Iman Gadzhi"
    topics: ["agency model", "scaling", "marketing"]
    priority: "high"
  - name: "Neil Patel"
    topics: ["SEO", "content marketing", "analytics"]
    priority: "medium"
  - name: "Wes McDowell"
    topics: ["agency marketing", "web strategy", "client acquisition"]
    priority: "medium"
  - name: "Ryan Deiss"
    topics: ["digital marketing", "funnels", "customer value"]
    priority: "medium"
  - name: "Amanda Natividad"
