# ============================================================
# COMMENTING STRATEGY (v2)
# ============================================================
# Controls how the Auto Commenter agent writes comments on
# influencer posts. These settings shape the tone, length,
# and approach of all generated comments.
# ============================================================

commenting_strategy:
  approach: "value_first"                      # value_first | thought_leader | contrarian | data_driven
  max_words: 150                               # Maximum words per comment
  min_words: 20                                # Minimum words (avoids content-free comments)
  tone: "peer_expert"                          # peer_expert | curious_learner | friendly_challenger
  preferred_formulas:                          # Which comment formulas to use most
    - "yes_and"                                # Build on their point with experience
    - "data_drop"                              # Share a relevant metric or result
    - "question"                               # Smart question revealing expertise
  backup_formulas:                             # Rotate in for variety
    - "contrarian"                             # Respectful nuance on their point
    - "story"                                  # Brief anecdote that teaches
    - "tool_insight"                           # Share something practical

  # Phrases the AI should NEVER use in comments
  never_use:
    - "Great post"
    - "Love this"
    - "So true"
    - "Couldn't agree more"
    - "This is gold"
    - "Spot on"
    - "Nailed it"
    - "100%"
    - "game changer"
    - "check out"
    - "DM me"
    - "we offer"
    - "our service"
    - "book a call"

  # Time-based rules to seem natural
  timing:
    comment_within_hours: 4                    # Comment within X hours of post going live
    avoid_commenting_at: ["23:00-06:00"]       # Don't comment during these hours
    stagger_comments: true                     # Don't post all comments at once

  # Engagement rules per influencer
  per_influencer:
    max_comments_per_week: 3                   # Don't over-comment on one person
    cooldown_after_no_response_days: 14        # Back off if they never engage back
    prioritize_responses: true                 # Comment more on influencers who reply
