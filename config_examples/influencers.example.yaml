# ============================================================
# LinkedIn Autopilot - Influencer Monitoring Configuration
# ============================================================
# The Trend Scout team monitors these influencers for hooks,
# frameworks, and content patterns to inspire your posts.
# ============================================================

# --- Monitoring Settings ---
monitor_frequency: "daily"               # daily | twice_daily | hourly
extract_hooks: true                      # Extract opening hooks from posts
extract_frameworks: true                 # Extract frameworks and templates

# --- Influencer List ---
# Priority: high = always monitor, medium = daily, low = weekly
influencers:
  - name: "Alex Hormozi"
    topics: ["offers", "scaling", "value", "lead generation"]
    priority: "high"

  - name: "Justin Welsh"
    topics: ["solopreneur", "LinkedIn growth", "systems", "content"]
    priority: "high"

  - name: "Sahil Bloom"
    topics: ["frameworks", "mental models", "growth", "curiosity"]
    priority: "high"

  - name: "Dickie Bush"
